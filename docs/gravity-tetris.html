<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>重心テトリス</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#fff;
  overflow:hidden;
}
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100dvh;
  touch-action:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  overscroll-behavior:none;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

canvas{
  display:block;
  flex:0 0 auto;
  aspect-ratio:1 / 1;
  max-width:100%;
  max-height:100%;
}

#ctrl{
  display:none;
  width:100%;
  max-width:480px;
  padding:6px 10px 12px;
  gap:6px;
  flex:0 0 auto;
  min-height:122px;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#ctrl .row{
  display:flex;
  justify-content:center;
  gap:6px;
}

#ctrl button{
  font-size:22px;
  width:60px;
  height:52px;
  border:none;
  border-radius:10px;
  background:#e0e0e0;
  color:#333;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

#ctrl button:active{background:#bbb}
#ctrl button.wide{width:130px;font-size:16px;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ctrl">
  <div class="row">
    <button id="bl">&#9664;</button>
    <button id="brot">&#8635;</button>
    <button id="bd">&#9660;</button>
    <button id="br">&#9654;</button>
  </div>
  <div class="row">
    <button id="bhard" class="wide">DROP</button>
  </div>
</div>

<script>
'use strict';

/* モバイル判定 */
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const ctrlEl = document.getElementById('ctrl');
if (isMobile) ctrlEl.style.display = 'flex';

/* キャンバス */
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

let W = 0, H = 0;

/* 安定版リサイズ */
function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 3);

  const vv = window.visualViewport;
  const vw = vv ? vv.width : window.innerWidth;
  const vh = vv ? vv.height : window.innerHeight;

  const ctrlH = isMobile ? ctrlEl.offsetHeight : 0;

  const safeTop = parseFloat(getComputedStyle(document.body).paddingTop) || 0;
  const safeBottom = parseFloat(getComputedStyle(document.body).paddingBottom) || 0;

  const availableW = Math.floor(vw);
  const availableH = Math.floor(vh - ctrlH - safeTop - safeBottom);

  const size = Math.max(100, Math.floor(Math.min(availableW, availableH)));

  W = size;
  H = size;

  /* CSSサイズ */
  cvs.style.width = W + 'px';
  cvs.style.height = H + 'px';

  /* 内部解像度 */
  cvs.width = Math.round(W * dpr);
  cvs.height = Math.round(H * dpr);

  /* 座標系リセット */
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}

resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', resize);
  window.visualViewport.addEventListener('scroll', resize);
}

/* 色 (モノクロ) */
const ACOL = '#cccccc'; // アクティブ
const PCOL = '#666666'; // 配置済

/* テトリミノ (回転中心=0,0) */
const S = [
  [[-1,0],[0,0],[1,0],[0,-1]],  // T
  [[0,0],[1,0],[0,1],[1,1]],    // O
  [[0,0],[1,0],[-1,1],[0,1]],   // S
  [[-1,0],[0,0],[0,1],[1,1]],   // Z
  [[-1,0],[0,0],[1,0],[2,0]],   // I
  [[-1,0],[0,0],[1,0],[1,-1]],  // L
  [[-1,-1],[-1,0],[0,0],[1,0]], // J
];
const rotCW = b => b.map(([x,y]) => [-y,x]);

/* 7-bag */
function bag(){
  const a = [0,1,2,3,4,5,6];
  for(let i=6;i>0;i--){
    const j = Math.random()*(i+1)|0;
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let G;

class Game{
  constructor(){
    this.F = new Map();       // "x,y"→color
    this.B = [];              // bag
    this.ni = this._pull();   // next index
    this.ci = 0;
    this.p = null;            // piece

    /* 回転アニメーション */
    this.anim = false;
    this.at = 0;              // timer
    this.ad = 0.35;           // duration
    this.aa = 0;              // target angle
    this.rn = 0;              // rotation steps

    /* 落下アニメーション */
    this.falling = [];        // [{blocks:[{x,y}], vy, dy, alpha}]
    this.fallAnim = false;
    this._pendingSpawn = false;

    /* 表示 */
    this.sc = 30;
    this.ts = 30;

    /* ゲーム */
    this.dt_ = 0;
    this.di = 600;            // drop interval ms
    this.sd = false;          // soft drop
    this.ov = false;          // game over
    this.n = 0;               // piece count

    this._spawn();
  }

  _pull(){
    if(!this.B.length) this.B = bag();
    return this.B.pop();
  }

  /* ピース出現 */
  _spawn(){
    const i = this.ni;
    this.ni = this._pull();
    const b = S[i].map(v => [...v]);

    let my = Infinity;
    for(const k of this.F.keys()) my = Math.min(my, +k.split(',')[1]);
    if(!isFinite(my)) my = 1;

    this.p = {i,b,x:0,y:my-4};
    this.dt_ = 0;

    if(!this._ok(0,0)) this.ov = true;
  }

  _ok(dx,dy,bl){
    if(!this.p) return false;
    const b = bl || this.p.b;
    const px = this.p.x + dx;
    const py = this.p.y + dy;

    let floor = 2;
    for(const k of this.F.keys()) floor = Math.max(floor, +k.split(',')[1] + 1);

    for(const [bx,by] of b){
      if(this.F.has(`${px+bx},${py+by}`)) return false;
      if(py + by >= floor) return false;
    }
    return true;
  }

  _move(dx,dy){
    if(this.anim || this.fallAnim || this.ov || !this.p) return false;
    if(this._ok(dx,dy)){
      this.p.x += dx;
      this.p.y += dy;
      return true;
    }
    return false;
  }

  _rotate(){
    if(this.anim || this.fallAnim || this.ov || !this.p || this.p.i === 1) return;
    const nb = rotCW(this.p.b);
    for(const [kx,ky] of [[0,0],[1,0],[-1,0],[0,-1],[1,-1],[-1,-1]]){
      if(this._ok(kx,ky,nb)){
        this.p.x += kx;
        this.p.y += ky;
        this.p.b = nb;
        return;
      }
    }
  }

  _ghostY(){
    if(!this.p) return null;
    let d = 0;
    while(d < 60 && this._ok(0,d+1)) d++;
    return d >= 59 ? null : this.p.y + d;
  }

  _hard(){
    if(this.anim || this.fallAnim || this.ov || !this.p) return;
    const g = this._ghostY();
    if(g == null) return;
    this.p.y = g;
    this._lock();
  }

  _clearLines(){
    let cleared = false;

    const rows = new Map();
    for(const k of this.F.keys()){
      const y = +k.split(',')[1];
      rows.set(y, (rows.get(y)||0) + 1);
    }
    for(const [y,cnt] of rows){
      if(cnt >= 8){
        for(const k of [...this.F.keys()]){
          if(+k.split(',')[1] === y) this.F.delete(k);
        }
        cleared = true;
      }
    }

    const cols = new Map();
    for(const k of this.F.keys()){
      const x = +k.split(',')[0];
      cols.set(x, (cols.get(x)||0) + 1);
    }
    for(const [x,cnt] of cols){
      if(cnt >= 8){
        for(const k of [...this.F.keys()]){
          if(+k.split(',')[0] === x) this.F.delete(k);
        }
        cleared = true;
      }
    }

    if(cleared) this._removeIsolated();
  }

  _removeIsolated(){
    if(this.F.size === 0) return;

    const visited = new Set();
    const comps = [];

    for(const k of this.F.keys()){
      if(visited.has(k)) continue;

      const comp = [];
      const q = [k];
      visited.add(k);

      while(q.length){
        const c = q.shift();
        comp.push(c);
        const [x,y] = c.split(',').map(Number);

        for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nk = `${x+dx},${y+dy}`;
          if(this.F.has(nk) && !visited.has(nk)){
            visited.add(nk);
            q.push(nk);
          }
        }
      }
      comps.push(comp);
    }

    let best = comps[0], bestDist = Infinity;
    for(const c of comps){
      let minD = Infinity;
      for(const k of c){
        const [x,y] = k.split(',').map(Number);
        const d = x*x + y*y;
        if(d < minD) minD = d;
      }
      if(minD < bestDist){
        bestDist = minD;
        best = c;
      }
    }

    const keep = new Set(best);

    const isolated = [];
    for(const k of [...this.F.keys()]){
      if(!keep.has(k)){
        const [x,y] = k.split(',').map(Number);
        isolated.push({x,y});
        this.F.delete(k);
      }
    }

    if(isolated.length > 0){
      this.falling.push({blocks:isolated, vy:0, dy:0, alpha:1});
      this.fallAnim = true;
    }
  }

  _lock(){
    const p = this.p;
    for(const [bx,by] of p.b) this.F.set(`${p.x+bx},${p.y+by}`,1);
    this.n++;
    this.p = null;

    this._clearLines();

    let cx = 0, cy = 0, n = 0;
    for(const k of this.F.keys()){
      const [x,y] = k.split(',').map(Number);
      cx += x;
      cy += y;
      n++;
    }

    if(n === 0){
      if(!this.fallAnim) this._spawn();
      else this._pendingSpawn = true;
      return;
    }

    cx /= n;
    cy /= n;

    const ang = Math.atan2(cx,cy);
    this.rn = Math.round(ang/(Math.PI/2));

    if(this.rn === 0){
      if(!this.fallAnim) this._spawn();
      else this._pendingSpawn = true;
    }else{
      this.anim = true;
      this.at = 0;
      this.aa = this.rn * Math.PI/2;
    }
  }

  _transformF(){
    let s = ((this.rn%4)+4)%4;
    if(!s) return;

    const nf = new Map();
    for(const [k,c] of this.F){
      let [x,y] = k.split(',').map(Number);
      for(let i=0;i<s;i++){
        const t = x;
        x = -y;
        y = t;
      }
      nf.set(`${x},${y}`,c);
    }
    this.F = nf;
  }

  update(dt){
    if(this.ov) return;

    if(this.falling.length > 0){
      const gravity = 40;
      for(const f of this.falling){
        f.vy += gravity * dt;
        f.dy += f.vy * dt;
        f.alpha = Math.max(0, 1 - f.dy / 20);
      }
      this.falling = this.falling.filter(f => f.alpha > 0);

      if(this.falling.length === 0){
        this.fallAnim = false;
        if(this._pendingSpawn){
          this._pendingSpawn = false;
          this._spawn();
        }
      }
    }

    if(this.anim){
      this.at += dt;
      if(this.at >= this.ad){
        this._transformF();
        this.anim = false;
        if(!this.fallAnim) this._spawn();
        else this._pendingSpawn = true;
      }
      return;
    }

    if(!this.p) return;

    const iv = this.sd ? 40 : this.di;
    this.dt_ += dt * 1000;

    while(this.dt_ >= iv){
      this.dt_ -= iv;
      if(!this._move(0,1)){
        this._lock();
        return;
      }
    }
  }

  _zoom(){
    let x0=-1,x1=1,y0=-1,y1=1;
    const add=(x,y)=>{
      x0=Math.min(x0,x);
      x1=Math.max(x1,x+1);
      y0=Math.min(y0,y);
      y1=Math.max(y1,y+1);
    };

    for(const k of this.F.keys()){
      const [x,y] = k.split(',').map(Number);
      add(x,y);
    }

    if(this.p){
      for(const [bx,by] of this.p.b){
        add(this.p.x+bx,this.p.y+by);
      }
    }

    const w = x1-x0, h = y1-y0;
    const d = this.anim ? Math.sqrt(w*w+h*h) : Math.max(w,h);

    /* ←ここを縦横対称に修正 */
    this.ts = Math.min(32, Math.max(5, Math.min(W,H)*0.5/(d+3)));
    this.sc += (this.ts - this.sc) * .07;
  }

  draw(){
    this._zoom();
    const s = this.sc;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.translate(W/2,H/2);

    if(this.anim){
      const t = Math.min(this.at/this.ad,1);
      const e = t<.5 ? 2*t*t : 1-(-2*t+2)**2/2;
      ctx.rotate(this.aa*e);
    }

    for(const k of this.F.keys()){
      const [gx,gy] = k.split(',').map(Number);
      blk(gx,gy,s,PCOL);
    }

    for(const f of this.falling){
      ctx.globalAlpha = f.alpha;
      for(const b of f.blocks){
        blk(b.x,b.y+f.dy,s,PCOL);
      }
      ctx.globalAlpha = 1;
    }

    ctx.beginPath();
    ctx.arc(0,0,Math.max(2,s*.13),0,Math.PI*2);
    ctx.fillStyle='#999';
    ctx.fill();

    if(this.p && !this.anim){
      const gy = this._ghostY();
      if(gy != null){
        for(const [bx,by] of this.p.b) ghost(this.p.x+bx,gy+by,s);
      }
      for(const [bx,by] of this.p.b) blk(this.p.x+bx,this.p.y+by,s,ACOL);

      ctx.beginPath();
      ctx.arc(this.p.x*s,this.p.y*s,Math.max(1.5,s*.1),0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,.25)';
      ctx.fill();
    }

    ctx.restore();

    drawNext(this);

    if(this.ov){
      ctx.fillStyle='rgba(255,255,255,.8)';
      ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.fillStyle='#000';
      ctx.font='bold 26px monospace';
      ctx.fillText('GAME OVER',W/2,H/2-8);
      ctx.font='12px monospace';
      ctx.fillStyle='#666';
      const msg=isMobile ? this.n+' pieces  |  Tap to restart' : this.n+' pieces  |  R to restart';
      ctx.fillText(msg,W/2,H/2+18);
    }

    if(!this.ov){
      ctx.fillStyle='rgba(0,0,0,.2)';
      ctx.font='10px monospace';
      ctx.textAlign='center';
      const help=isMobile ? '' : '←→ Move  ↑ Rotate  ↓ Drop  Space Hard';
      ctx.fillText(help,W/2,H-8);
    }
  }
}

/* ブロック描画 */
function blk(gx,gy,s,col){
  const g=Math.max(1,s*.06);
  ctx.fillStyle=col;
  ctx.fillRect((gx-.5)*s+g,(gy-.5)*s+g,s-g*2,s-g*2);
}

/* ゴースト */
function ghost(gx,gy,s){
  const g=Math.max(1,s*.06);
  ctx.strokeStyle='rgba(0,0,0,.2)';
  ctx.lineWidth=1;
  ctx.strokeRect((gx-.5)*s+g,(gy-.5)*s+g,s-g*2,s-g*2);
}

/* NEXT */
function drawNext(g){
  const sh=S[g.ni];
  const col=ACOL;
  const ns=13,ox=W/2,oy=32;
  let sx=0,sy=0;
  for(const[bx,by]of sh){sx+=bx;sy+=by;}
  sx/=sh.length;sy/=sh.length;

  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.font='9px monospace';
  ctx.textAlign='center';
  ctx.fillText('NEXT',ox,12);

  for(const[bx,by]of sh){
    ctx.fillStyle=col;
    ctx.fillRect(ox+(bx-sx)*ns-ns/2+1,oy+(by-sy)*ns-ns/2+1,ns-2,ns-2);
  }
}

/* ゲーム開始 */
G = new Game();

/* キーボード */
document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R'){G=new Game();return;}
  if(G.ov||G.anim||G.fallAnim)return;

  switch(e.key){
    case 'ArrowLeft': G._move(-1,0); break;
    case 'ArrowRight': G._move(1,0); break;
    case 'ArrowDown': G.sd=true; break;
    case 'ArrowUp':
    case 'z':
    case 'Z': G._rotate(); break;
    case ' ': G._hard(); break;
  }

  if(['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)){
    e.preventDefault();
  }
});

document.addEventListener('keyup',e=>{
  if(e.key==='ArrowDown') G.sd=false;
});

/* ボタン操作（スマホ） */
(function(){
  function repeat(id,action){
    const btn=document.getElementById(id);
    let tid=0,iid=0;

    function start(e){
      e.preventDefault();
      if(G.ov){G=new Game();return;}
      action();
      clearTimeout(tid);
      clearInterval(iid);
      tid=setTimeout(()=>{iid=setInterval(action,80);},200);
    }

    function stop(e){
      e.preventDefault();
      clearTimeout(tid);
      clearInterval(iid);
    }

    btn.addEventListener('touchstart',start,{passive:false});
    btn.addEventListener('touchend',stop,{passive:false});
    btn.addEventListener('touchcancel',stop,{passive:false});
  }

  function once(id,action){
    const btn=document.getElementById(id);
    btn.addEventListener('touchstart',e=>{
      e.preventDefault();
      if(G.ov){G=new Game();return;}
      action();
    },{passive:false});
    btn.addEventListener('touchend',e=>e.preventDefault(),{passive:false});
  }

  repeat('bl',()=>G._move(-1,0));
  repeat('br',()=>G._move(1,0));
  repeat('bd',()=>G._move(0,1));
  once('brot',()=>G._rotate());
  once('bhard',()=>G._hard());

  cvs.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(G.ov) G=new Game();
  },{passive:false});
})();

/* ダブルタップ拡大防止 */
let lastTouchEnd = 0;
document.addEventListener('touchend', function (e) {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

/* ループ */
let lt = performance.now();
(function lp(t){
  const dt = Math.min((t-lt)/1000,.08);
  lt = t;
  G.update(dt);
  G.draw();
  requestAnimationFrame(lp);
})(lt);
</script>
</body>
</html>
